# 檔案：specifics/node/pipeline.yml

stages:
  - build_and_push

Task:Node_Build_Component:
  stage: build_and_push
  trigger:
    include:
      - project: 'root/ci-cd-platform'
        file: '/specifics/node/components/sonarqube-before-build-copy.yml'
        inputs:
          node_version: "22-alpine"
          ci_image: "ci-image:latest"
          sonar_host: "http://host.docker.internal:9000"
          image_tag: "${IMAGE_TAG}"
          src_dir: "$PROJECT_SUBDIR"
    strategy: depend
    forward:
      pipeline_variables: true