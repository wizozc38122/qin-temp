version: '3.9'

# ═══════════════════════════════════════════════════════════════
# Kong-B (Production 模擬)
# Admin API: http://localhost:29001
# Proxy:     http://localhost:29000
# ═══════════════════════════════════════════════════════════════

x-kong-env: &kong-env
  KONG_DATABASE: postgres
  KONG_PG_HOST: kong-b-db
  KONG_PG_USER: kong
  KONG_PG_PASSWORD: kongpass
  KONG_PASSWORD: test

services:
  kong-b-migrations:
    image: kong:3.6.0
    command: kong migrations bootstrap
    environment:
      <<: *kong-env
    depends_on:
      kong-b-db:
        condition: service_healthy
    restart: "no"

  kong-b-gateway:
    image: kong:3.6.0
    container_name: kong-b-gateway
    environment:
      <<: *kong-env
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "29000:8000"   # Proxy HTTP  (mapped to 29000)
      - "29443:8443"   # Proxy HTTPS (mapped to 29443)
      - "29001:8001"   # Admin API HTTP  (mapped to 29001)
      - "29444:8444"   # Admin API HTTPS (mapped to 29444)
    depends_on:
      kong-b-migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  kong-b-db:
    image: postgres:13
    container_name: kong-b-db
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    volumes:
      - kong-b-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  kong-b-data:
