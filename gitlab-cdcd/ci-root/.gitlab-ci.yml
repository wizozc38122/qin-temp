workflow:
  rules:
    # 1. 擋掉 MR 觸發，避免重複執行
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    
    # 🌟 2. 補上這行！把剩下的觸發方式 (如 push 分支、手動 Web 點擊、API 觸發) 全部放行！
    - when: always

stages:
  - setup
  - trigger-routing

Task:Derive_Variables:
  stage: setup
  tags: [shell]
  script:
    - echo "開始進行動態變數推導..."
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        echo "DEPLOY_ENV=production" >> build.env
        echo "IMAGE_TAG=prod-$CI_COMMIT_SHORT_SHA" >> build.env
      else
        echo "DEPLOY_ENV=development" >> build.env
        echo "IMAGE_TAG=dev-$CI_COMMIT_SHORT_SHA" >> build.env
      fi
  artifacts:
    reports:
      dotenv: build.env

Call_Dotnet:
  stage: trigger-routing
  needs: ["Task:Derive_Variables"]
  rules:
    - if: '$LANGUAGE_TYPE == "dotnet"'
  trigger:
    include:
      - project: 'root/ci-cd-platform'
        file: '/specifics/dotnet/pipeline.yml'  # 🌟 對應你的目錄結構
    strategy: depend
    forward:
      pipeline_variables: true